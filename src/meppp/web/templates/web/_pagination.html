{% if page.has_other_pages %}
  <nav class="pagination" aria-label="分页">
    {% if page.has_previous %}
      <a rel="prev" href="?{% if query_string %}{{ query_string }}&amp;{% endif %}page={{ page.previous_page_number }}">上一页</a>
    {% else %}
      <span aria-disabled="true">上一页</span>
    {% endif %}
    <strong><span class="sr-only">当前第</span>{{ page.number }} / {{ page.paginator.num_pages }}</strong>
    {% if page.has_next %}
      <a rel="next" href="?{% if query_string %}{{ query_string }}&amp;{% endif %}page={{ page.next_page_number }}">下一页</a>
    {% else %}
      <span aria-disabled="true">下一页</span>
    {% endif %}
  </nav>
{% endif %}
