{% extends 'web/base.html' %}
{% block title %}写一条 · {{ site_config.site_name }}{% endblock %}
{% block content %}
  <div class="reading-column composer-page">
    <header class="stream-page-header">
      <a class="back-link" href="{% url 'web:home' %}" aria-label="返回广场"><span aria-hidden="true">←</span></a>
      <h1 id="composer-title">发布动态</h1>
    </header>
    <section class="form-surface" aria-labelledby="composer-title">
      {% include 'web/_entry_composer_form.html' with form=form site_config=site_config %}
    </section>
  </div>
{% endblock %}
