{% extends 'web/base.html' %}
{% block title %}修改密码 · {{ site_config.site_name }}{% endblock %}
{% block content %}
  <div class="narrow-form-page">
    <a class="back-link" href="{% url 'web:member-settings' %}"><span aria-hidden="true">←</span> 返回资料与账号</a>
    <p class="eyebrow">ACCOUNT SAFETY</p>
    <h1>修改密码</h1>
    <p class="form-lead">需要先输入当前密码。修改成功后，这台设备会继续保持登录。</p>
    <form method="post" class="stacked-form" novalidate>
      {% csrf_token %}
      {% include 'web/_form_fields.html' with form=form only %}
      <div class="form-actions">
        <button class="button-primary" type="submit">确认修改</button>
        <a class="button-secondary" href="{% url 'web:member-settings' %}">取消</a>
      </div>
    </form>
  </div>
{% endblock %}
